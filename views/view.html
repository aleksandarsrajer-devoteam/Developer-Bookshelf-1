{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <div class="row">
                <div class="col-md-4">
                    <img src="{{ book.imageUrl if book.imageUrl else 'https://storage.googleapis.com/cloud-training/devapps-foundations/no-cover.png' }}" class="img-fluid rounded shadow-sm">
                </div>
                <div class="col-md-8">
                    <h2 class="fw-bold">{{ book.title }}</h2>
                    <h5 class="text-primary">By {{ book.author|default('Unknown', true) }}</h5>
                    <p class="text-muted mt-3">{{ book.description }}</p>
                    <p class="small text-muted">Published: {{ book.publishedDate }}</p>
                    <div class="mt-4">
                        <a href="/books/{{book.id}}/edit" class="btn btn-outline-primary btn-sm rounded-pill px-3 me-2">
                            <i class="fas fa-edit me-1"></i> Edit
                        </a>
                        <a href="/books/{{book.id}}/delete" class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="return confirm('Delete this book?')">
                            <i class="fas fa-trash me-1"></i> Delete
                        </a>
                    </div>
                </div>
            </div>
            <hr class="my-4">
            <a href="/" class="btn btn-link text-decoration-none text-muted"><i class="fas fa-arrow-left me-2"></i>Back to Library</a>
        </div>
    </div>
</div>
{% endblock %}
