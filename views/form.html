{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="fw-bold mb-4">{{action}} Book</h3>
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-bold">Title</label>
                    <input type="text" name="title" value="{{book.title}}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Author</label>
                    <input type="text" name="author" value="{{book.author}}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Published Date</label>
                    <input type="text" name="publishedDate" value="{{book.publishedDate}}" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea name="description" class="form-control" rows="3">{{book.description}}</textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Cover Image</label>
                    <input type="file" name="image" class="form-control">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success flex-grow-1 rounded-pill">Save Book</button>
                    <a href="/" class="btn btn-light rounded-pill">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
